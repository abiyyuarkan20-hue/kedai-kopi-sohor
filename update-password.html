<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password | Sohor Kopi</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="src/auth.js"></script>

    <style>
      [x-cloak] {
        display: none !important;
      }
      .update-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
    </style>
  </head>
  <body x-data="updatePasswordHandler" x-cloak>
    <div class="bg-decoration">
      <div class="glow glow-1"></div>
    </div>

    <main class="update-container">
      <div class="auth-card">
        <div class="logo-wrapper">
          <div class="logo-icon">🔒</div>
          <h1>Set New<span>Password</span></h1>
          <p class="subtitle">Enter your new secure password below</p>
        </div>

        <form @submit.prevent="handleUpdate" class="auth-form">
          <div class="input-group">
            <label>New Password</label>
            <input
              type="password"
              x-model="newPassword"
              placeholder="••••••••"
              minlength="6"
              required
            />
          </div>

          <div class="input-group">
            <label>Confirm New Password</label>
            <input
              type="password"
              x-model="confirmPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-primary" :disabled="loading">
            <span x-show="!loading">Update Password</span>
            <span x-show="loading">Updating...</span>
          </button>
        </form>

        <p class="footer-text" style="margin-top: 20px">
          <a href="login.html" style="color: #b6895b; text-decoration: none"
            >Back to Login</a
          >
        </p>
      </div>
    </main>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("updatePasswordHandler", () => ({
          newPassword: "",
          confirmPassword: "",
          loading: false,
          hasSession: false,

          async init() {
            // Cek apakah ada session dari link email (token di URL)
            const { data, error } = await sbClient.auth.getSession();

            if (data.session) {
              this.hasSession = true;
              console.log("Session ditemukan, silakan ganti password.");
            } else {
              alert(
                "Sesi tidak valid atau kadaluarsa! Silakan minta link reset password baru.",
              );
              window.location.href = "login.html";
            }
          },

          async handleUpdate() {
            if (this.newPassword !== this.confirmPassword) {
              alert("Password tidak cocok!");
              return;
            }

            this.loading = true;
            try {
              const { error } = await sbClient.auth.updateUser({
                password: this.newPassword,
              });

              if (error) throw error;

              alert("Password berhasil diperbarui!");

              // Bersihkan sesi dan arahkan ke login
              await sbClient.auth.signOut();
              localStorage.removeItem("user");
              window.location.href = "login.html";
            } catch (err) {
              alert("Gagal memperbarui password: " + err.message);
            } finally {
              this.loading = false;
            }
          },
        }));
      });
    </script>
  </body>
</html>
